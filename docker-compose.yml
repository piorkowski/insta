services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  phoenix-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phoenix_api
    volumes:
      - phoenix-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  symfony-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: symfony_app
    volumes:
      - symfony-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  phoenix:
    build:
      context: ./phoenix-api
      dockerfile: Dockerfile
      target: dev
    depends_on:
      phoenix-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@phoenix-db/phoenix_api
      SECRET_KEY_BASE: ${PHOENIX_SECRET_KEY_BASE:-thisisasecret111}
      PHX_HOST: 0.0.0.0
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./phoenix-api:/app

  symfony:
    build:
      context: ./symfony-app
      dockerfile: Dockerfile
      target: dev
    depends_on:
      symfony-db:
        condition: service_healthy
      phoenix:
        condition: service_started
      redis:
        condition: service_started
    environment:
      APP_ENV: dev
      APP_SECRET: ${SYMFONY_APP_SECRET:-thisisasecret222}
      PHOENIX_BASE_URL: http://phoenix:4000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@symfony-db:5432/symfony_app
    ports:
      - "8000:8000"
    volumes:
      - ./symfony-app:/app

volumes:
  phoenix-db-data:
  symfony-db-data:
  redis-data:
